<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.1.1/plotly.min.js"></script>
</head>

<body>
  <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand">Janssen<span>.</span></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" style="border-color: rgba(79,195,247,0.3);">
              <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
          </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMenu">
      <div class='nav'> <a href="/home">Home </a></div>
      <div class = 'nav'> <a href="/data1">Data 1 </a></div>
      <div class='nav'><a href="/data2">Data 2 </a></div>
      <div class='nav'><a href="/explore">Explore</a><div>
      <div class='nav'><a href="/definitions">Definitions</a></div>
  </div>
</div>
</nav>


  <section class="banner">
      <img src="static/images/banner.jpg" alt="Banner" onerror="this.style.display='none'; document.querySelector('.banner-fallback').style.display='flex';">

     <div class="banner-overlay"></div>
      <div class="banner-text">
        <h1>Example Data #1</h1>
      </div>
  </section>

   <section class="chart-section">
        <div class="chart-card">
            <h2>Exoplanet Discoveries Per Year</h2>
            <p>Number of exoplanets discovered each year, colored by volume.</p>
            <div id="exoplanet-chart"></div>
        </div>
    </section>

     <script>
    //bar chart
      const chartData = {{ chart_json | safe }};
        Plotly.newPlot('exoplanet-chart', chartData.data, chartData.layout, {
            responsive: true,
            displayModeBar: true,
        });
  </script>

</body>
</html>
