            <div id="exoplanet-chart"></div>

     <script>
    //bar chart
      const chartData = {{ chart_json | safe }};
        Plotly.newPlot('exoplanet-chart', chartData.data, chartData.layout, {
            responsive: true,
            displayModeBar: true,
        });
